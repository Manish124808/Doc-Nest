<svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
>
  <defs>
    <linearGradient id="clockBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <!-- LEFT decorative arc -->
  <path
    d="M4 12 A4 4 0 0 1 6 9"
    fill="none"
    stroke="url(#clockBorder)"
    stroke-width="2"
    stroke-linecap="round"
  />

  <path
    d="M4 12 A4 4 0 0 0 6 15"
    fill="none"
    stroke="url(#clockBorder)"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- RIGHT decorative arc -->
  <path
    d="M20 12 A4 4 0 0 0 18 9"
    fill="none"
    stroke="url(#clockBorder)"
    stroke-width="2"
    stroke-linecap="round"
  />

  <path
    d="M20 12 A4 4 0 0 1 18 15"
    fill="none"
    stroke="url(#clockBorder)"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Main clock circle -->
  <circle
    cx="12"
    cy="12"
    r="8"
    fill="white"
    stroke="url(#clockBorder)"
    stroke-width="2"
  />

  <!-- Hour hand -->
  <line
    x1="12"
    y1="12"
    x2="12"
    y2="7"
    stroke="#374151"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Minute hand -->
  <line
    x1="12"
    y1="12"
    x2="16"
    y2="14"
    stroke="#374151"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" fill="#374151" />
</svg>