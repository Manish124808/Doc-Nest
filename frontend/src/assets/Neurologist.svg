<svg width="127" height="126" viewBox="0 0 127 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg1" x1="63.5" y1="0" x2="63.5" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <!-- Skin tone gradient -->
    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F6BF82"/>
    </linearGradient>
    <!-- Coat fabric gradient -->
    <linearGradient id="coat1" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="sh1" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <!-- Coat shadow -->
    <filter id="coatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#CBD5E1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="63.5" cy="63" r="63" fill="url(#bg1)" filter="url(#sh1)"/>

  <!-- Doctor's White Coat - Enhanced with buttons, pockets, and lapels -->
  <!-- Main coat body -->
  <path d="M38 78 Q38 110 48 118 L79 118 Q89 110 89 78 L89 65 Q85 60 78 62 L49 62 Q42 60 38 65 Z" 
        fill="url(#coat1)" filter="url(#coatShadow)"/>
  
  <!-- Coat lapels -->
  <path d="M48 68 L52 75 L60 82 L68 82 L76 75 L80 68" fill="#E2E8F0" opacity="0.9"/>
  
  <!-- Coat buttons -->
  <circle cx="63.5" cy="85" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="95" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="105" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  
  <!-- Left coat pocket -->
  <rect x="45" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="47" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>
  
  <!-- Right coat pocket -->
  <rect x="70" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="72" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>

  <!-- Light blue shirt collar -->
  <path d="M52 72 L58 65 L69 65 L75 72" fill="#67E8F9" opacity="0.95"/>
  <path d="M58 65 L63.5 68 L69 65" fill="#F8FAFC" opacity="0.8"/>

  <!-- Shirt body -->
  <rect x="52" y="72" width="23" height="20" rx="3" fill="#67E8F9" opacity="0.9"/>

  <!-- Neck -->
  <rect x="58" y="65" width="11" height="10" rx="5" fill="url(#skin1)"/>

  <!-- Head -->
  <ellipse cx="63.5" cy="50" rx="22" ry="24" fill="url(#skin1)"/>

  <!-- Hair (professional style with gray temples) -->
  <path d="M42 35 Q48 26 63.5 24 Q79 26 85 35 Q82 30 72 28 Q67 27 63.5 26 Q60 27 55 28 Q52 30 42 35Z" fill="#1F2937"/>
  <!-- Gray temples -->
  <path d="M44 34 Q49 28 53 29" fill="none" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
  <path d="M74 34 Q79 28 83 30" fill="none" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="41" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>
  <ellipse cx="86" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>

  <!-- Eyes -->
  <ellipse cx="55" cy="47" rx="2.5" ry="3.5" fill="#1E2937"/>
  <ellipse cx="72" cy="47" rx="2.5" ry="3.5" fill="#1E2937"/>
  
  <!-- Eye shines -->
  <circle cx="56.2" cy="45.5" r="0.8" fill="#FFFFFF"/>
  <circle cx="73.2" cy="45.5" r="0.8" fill="#FFFFFF"/>

  <!-- Eyebrows -->
  <path d="M50 38 Q55 36 59 37" fill="none" stroke="#1E2937" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M68 37 Q73 36 77 38" fill="none" stroke="#1E2937" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Gentle reassuring smile -->
  <path d="M54 60 Q63.5 64 73 60" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>

  <!-- Glasses (optional professional touch) -->
  <ellipse cx="55" cy="47" rx="4.5" ry="2.5" fill="none" stroke="#374151" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="72" cy="47" rx="4.5" ry="2.5" fill="none" stroke="#374151" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M59 47.5 L68 47.5" fill="none" stroke="#374151" stroke-width="1.2"/>

  <!-- Stethoscope - Enhanced -->
  <!-- Left tube -->
  <path d="M45 72 Q38 82 40 95 Q42 105 48 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right tube -->
  <path d="M82 72 Q89 82 87 95 Q85 105 79 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Earpieces -->
  <ellipse cx="40" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <ellipse cx="87" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <!-- Chest piece -->
  <circle cx="63.5" cy="108" r="5.5" fill="#E2E8F0" stroke="#1E2937" stroke-width="2"/>
  <circle cx="63.5" cy="108" r="2" fill="#F1F5F9"/>

  <!-- Name tag on coat -->
  <rect x="52" y="78" width="23" height="6" rx="2" fill="#3B82F6" stroke="#1E40AF" stroke-width="0.8"/>
  <text x="63.5" y="83" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">Dr. Lee</text>

  <!-- Medical caduceus badge on lapel -->
  <g transform="translate(78 75) scale(0.7)">
    <circle cx="0" cy="0" r="4" fill="#10B981" stroke="#059669" stroke-width="0.5"/>
    <path d="M0 -2 L-1 2 L1 2 Z" fill="#059669"/>
    <circle cx="-1.5" cy="1.5" r="0.5" fill="white"/>
    <circle cx="1.5" cy="1.5" r="0.5" fill="white"/>
  </g>

  <!-- Coat collar highlight -->
  <path d="M48 66 L55 62 L72 62 L79 66" fill="#F8FAFC" opacity="0.8"/>
</svg>