<svg width="126" height="126" viewBox="0 0 126 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="126" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="stG" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="g10"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="cc10"><circle cx="63" cy="63" r="60"/></clipPath>
  </defs>
  <circle cx="63" cy="63" r="63" fill="url(#bg10)"/>
  <!-- gradient border -->
  <circle cx="63" cy="63" r="62" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.6"/>
  <!-- glass panel -->
  <rect x="16" y="30" width="94" height="72" rx="14" fill="url(#glass)" stroke="white" stroke-width="0.8" stroke-opacity="0.2" clip-path="url(#cc10)"/>
  <!-- top shine strip -->
  <rect x="16" y="30" width="94" height="10" rx="5" fill="white" opacity="0.07" clip-path="url(#cc10)"/>
  <!-- stethoscope icon centered in glass card -->
  <!-- arms -->
  <path d="M63 58 Q50 58 48 48" fill="none" stroke="url(#stG)" stroke-width="3.5" stroke-linecap="round" filter="url(#g10)"/>
  <path d="M63 58 Q76 58 78 48" fill="none" stroke="url(#stG)" stroke-width="3.5" stroke-linecap="round" filter="url(#g10)"/>
  <!-- earpieces -->
  <circle cx="47" cy="46" r="3.5" fill="#93C5FD" filter="url(#g10)"/>
  <circle cx="79" cy="46" r="3.5" fill="#C4B5FD" filter="url(#g10)"/>
  <!-- stem -->
  <rect x="60.5" y="58" width="5" height="20" rx="2.5" fill="url(#stG)" filter="url(#g10)"/>
  <!-- loop -->
  <path d="M63 78 Q63 92 54 95 Q45 98 43 90 Q41 82 50 78" fill="none" stroke="url(#stG)" stroke-width="3.5" stroke-linecap="round" filter="url(#g10)"/>
  <!-- chest piece -->
  <circle cx="47" cy="89" r="5.5" fill="#1E1B4B" stroke="url(#stG)" stroke-width="1.5"/>
  <circle cx="47" cy="89" r="2.5" fill="url(#stG)" opacity="0.8"/>
  <!-- cross top right inside glass -->
  <circle cx="88" cy="50" r="11" fill="#4F46E5" opacity="0.9"/>
  <rect x="84" y="43" width="8" height="14" rx="3.5" fill="white"/>
  <rect x="81" y="47" width="14" height="6" rx="2.5" fill="white"/>
  <!-- label -->
  <text x="63" y="112" text-anchor="middle" font-family="monospace" font-size="5.5" letter-spacing="2.5" fill="#A5B4FC" opacity="0.85">GENERAL PHYSICIAN</text>
</svg>
