<svg width="127" height="126" viewBox="0 0 127 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Same background gradient -->
    <linearGradient id="bg1" x1="63.5" y1="0" x2="63.5" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <!-- Skin tone gradient (slightly warmer) -->
    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#F59E42"/>
    </linearGradient>
    <!-- Coat fabric gradient -->
    <linearGradient id="coat1" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="sh1" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <!-- Coat shadow -->
    <filter id="coatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#CBD5E1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="63.5" cy="63" r="63" fill="url(#bg1)" filter="url(#sh1)"/>

  <!-- General Physician White Coat -->
  <!-- Main coat body -->
  <path d="M38 78 Q38 110 48 118 L79 118 Q89 110 89 78 L89 65 Q85 60 78 62 L49 62 Q42 60 38 65 Z" 
        fill="url(#coat1)" filter="url(#coatShadow)"/>
  
  <!-- Coat lapels -->
  <path d="M48 68 L52 75 L60 82 L68 82 L76 75 L80 68" fill="#E2E8F0" opacity="0.9"/>
  
  <!-- Coat buttons -->
  <circle cx="63.5" cy="85" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="95" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="105" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  
  <!-- Chest pockets with pen -->
  <rect x="45" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="47" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>
  <!-- Pen in pocket -->
  <rect x="48" y="89" width="10" height="1.5" rx="0.8" fill="#DC2626" stroke="#B91C1C" stroke-width="0.3"/>
  <rect x="50" y="87.5" width="1" height="3" rx="0.5" fill="#F59E0B"/>
  
  <rect x="70" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="72" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>

  <!-- Light blue shirt (classic physician) -->
  <path d="M52 72 L58 65 L69 65 L75 72" fill="#60A5FA" opacity="0.95"/>
  <path d="M58 65 L63.5 68 L69 65" fill="#BFDBFE" opacity="0.8"/>
  <rect x="52" y="72" width="23" height="20" rx="3" fill="#60A5FA" opacity="0.9"/>

  <!-- Neck -->
  <rect x="58" y="65" width="11" height="10" rx="5" fill="url(#skin1)"/>

  <!-- Head -->
  <ellipse cx="63.5" cy="50" rx="22" ry="24" fill="url(#skin1)"/>

  <!-- Neat straight hair with widow's peak -->
  <path d="M42 34 Q48 27 58 25 Q63.5 24 67 26 Q72 27 80 30 Q85 34 83 38 Q78 34 70 33 Q65 32 63.5 31 Q62 32 55 33 Q50 34 42 36Z" fill="#111827"/>
  <!-- Hair highlights -->
  <path d="M60 28 Q64 26 67 28" fill="#374151" opacity="0.7"/>

  <!-- Ears -->
  <ellipse cx="41" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>
  <ellipse cx="86" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>

  <!-- Eyes (warm, caring gaze) -->
  <ellipse cx="54" cy="47" rx="2.6" ry="3.6" fill="#0F172A"/>
  <ellipse cx="73" cy="47.5" rx="2.6" ry="3.6" fill="#0F172A"/>
  
  <!-- Eye shines -->
  <circle cx="55.3" cy="45.5" r="0.85" fill="#FFFFFF"/>
  <circle cx="74.3" cy="46" r="0.85" fill="#FFFFFF"/>

  <!-- Eyebrows (gentle, reassuring) -->
  <path d="M50 37.5 Q55.5 36 60 37.5" fill="none" stroke="#0F172A" stroke-width="2.3" stroke-linecap="round"/>
  <path d="M67 38 Q72.5 37 77 38.5" fill="none" stroke="#0F172A" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Warm welcoming smile -->
  <path d="M54 60 Q63.5 63.5 73 60.5" fill="none" stroke="#1E293B" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Otoscope in other pocket (general practice tool) -->
  <g transform="translate(73 91)">
    <circle cx="3" cy="1" r="2.5" fill="#FBBF24" stroke="#D97706" stroke-width="0.5"/>
    <rect x="1.5" y="3.5" width="4" height="3" rx="1" fill="#F59E0B"/>
    <circle cx="3" cy="1" r="0.8" fill="white"/>
  </g>

  <!-- Stethoscope -->
  <path d="M45 72 Q38 82 40 95 Q42 105 48 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M82 72 Q89 82 87 95 Q85 105 79 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="40" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <ellipse cx="87" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <circle cx="63.5" cy="108" r="5.5" fill="#E2E8F0" stroke="#1E2937" stroke-width="2"/>
  <circle cx="63.5" cy="108" r="2" fill="#F1F5F9"/>

  <!-- Name tag -->
  <rect x="52" y="78" width="23" height="6" rx="2" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="63.5" y="83" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">Dr. Garcia</text>

  <!-- General Practice badge (heartbeat/ECG) -->
  <g transform="translate(77 76) scale(0.7)">
    <circle cx="0" cy="0" r="4" fill="#EC4899" stroke="#BE185D" stroke-width="0.5"/>
    <!-- ECG waveform -->
    <path d="M-3 0 L-1.5 2 L0 0 L1.5 -1.5 L3 0" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Coat collar highlight -->
  <path d="M48 66 L55 62 L72 62 L79 66" fill="#F8FAFC" opacity="0.8"/>
</svg>