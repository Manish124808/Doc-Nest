<svg width="127" height="126" viewBox="0 0 127 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Same background gradient -->
    <linearGradient id="bg1" x1="63.5" y1="0" x2="63.5" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <!-- Skin tone gradient -->
    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F6BF82"/>
    </linearGradient>
    <!-- Coat fabric gradient -->
    <linearGradient id="coat1" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="sh1" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <!-- Coat shadow -->
    <filter id="coatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#CBD5E1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="63.5" cy="63" r="63" fill="url(#bg1)" filter="url(#sh1)"/>

  <!-- Gastroenterologist White Coat -->
  <!-- Main coat body -->
  <path d="M38 78 Q38 110 48 118 L79 118 Q89 110 89 78 L89 65 Q85 60 78 62 L49 62 Q42 60 38 65 Z" 
        fill="url(#coat1)" filter="url(#coatShadow)"/>
  
  <!-- Coat lapels -->
  <path d="M48 68 L52 75 L60 82 L68 82 L76 75 L80 68" fill="#E2E8F0" opacity="0.9"/>
  
  <!-- Coat buttons -->
  <circle cx="63.5" cy="85" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="95" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="63.5" cy="105" r="2.5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  
  <!-- Chest pockets -->
  <rect x="45" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="47" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>
  <rect x="70" y="88" width="12" height="8" rx="2" fill="#E2E8F0" opacity="0.7"/>
  <rect x="72" y="90" width="8" height="4" rx="1" fill="#F1F5F9"/>

  <!-- Light green shirt (GI specialty color) -->
  <path d="M52 72 L58 65 L69 65 L75 72" fill="#86EFAC" opacity="0.95"/>
  <path d="M58 65 L63.5 68 L69 65" fill="#F0FDF4" opacity="0.8"/>
  <rect x="52" y="72" width="23" height="20" rx="3" fill="#86EFAC" opacity="0.9"/>

  <!-- Neck -->
  <rect x="58" y="65" width="11" height="10" rx="5" fill="url(#skin1)"/>

  <!-- Head -->
  <ellipse cx="63.5" cy="50" rx="22" ry="24" fill="url(#skin1)"/>

  <!-- Short curly hair with side part -->
  <path d="M43 36 Q47 28 56 26 Q62 25 63.5 27 Q65 25 71 26 Q80 28 84 36 Q81 32 73 30 Q68 29 63.5 28 Q59 29 52 30 Q47 32 43 36Z" fill="#2D3748"/>
  <!-- Subtle highlights -->
  <path d="M58 28 Q62 26 65 27" fill="#4A5568" opacity="0.6"/>

  <!-- Ears -->
  <ellipse cx="41" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>
  <ellipse cx="86" cy="50" rx="3.5" ry="5.5" fill="url(#skin1)"/>

  <!-- Eyes (confident gaze) -->
  <ellipse cx="54.5" cy="46.5" rx="2.8" ry="3.8" fill="#1A202C"/>
  <ellipse cx="72.5" cy="47.5" rx="2.8" ry="3.8" fill="#1A202C"/>
  
  <!-- Eye shines -->
  <circle cx="55.8" cy="45" r="0.9" fill="#FFFFFF"/>
  <circle cx="73.8" cy="46" r="0.9" fill="#FFFFFF"/>

  <!-- Eyebrows (determined expression) -->
  <path d="M49.5 37 Q55 35.5 59.5 36.5" fill="none" stroke="#1A202C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M67.5 37 Q73 36 77.5 37.5" fill="none" stroke="#1A202C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Friendly professional smile -->
  <path d="M53.5 59 Q63.5 62.5 73.5 59.5" fill="none" stroke="#2D3748" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Endoscope tool in pocket -->
  <g transform="translate(48 92)">
    <rect x="0" y="0" width="10" height="2" rx="1" fill="#059669" stroke="#047857" stroke-width="0.5"/>
    <circle cx="5" cy="-1" r="1.5" fill="#10B981"/>
    <path d="M2 1 Q5 3 8 1" fill="none" stroke="#047857" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Stethoscope -->
  <path d="M45 72 Q38 82 40 95 Q42 105 48 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M82 72 Q89 82 87 95 Q85 105 79 108" fill="none" stroke="#1E2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="40" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <ellipse cx="87" cy="95" rx="2.5" ry="4" fill="#1E2937"/>
  <circle cx="63.5" cy="108" r="5.5" fill="#E2E8F0" stroke="#1E2937" stroke-width="2"/>
  <circle cx="63.5" cy="108" r="2" fill="#F1F5F9"/>

  <!-- Name tag -->
  <rect x="52" y="78" width="23" height="6" rx="2" fill="#10B981" stroke="#059669" stroke-width="0.8"/>
  <text x="63.5" y="83" font-family="Arial, sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">Dr. Patel</text>

  <!-- GI specialty badge (stomach icon) -->
  <g transform="translate(76 76) scale(0.65)">
    <ellipse cx="0" cy="0" rx="4" ry="3" fill="#F59E0B" stroke="#D97706" stroke-width="0.5"/>
    <!-- Stomach shape -->
    <path d="M-2.5 0 Q0 -1.5 2.5 0 Q3 1 2 2 Q0 2.5 -2 2 Q-3 1 -2.5 0 Z" fill="#EF4444"/>
    <path d="M-1 0.5 Q0 1 1 0.5" fill="none" stroke="#B91C1C" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Coat collar highlight -->
  <path d="M48 66 L55 62 L72 62 L79 66" fill="#F8FAFC" opacity="0.8"/>
</svg>