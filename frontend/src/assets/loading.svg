      M28 46 H36 C36 44 34 42 32 40 C30 42 28 44 28 46Z;
      M24 50 H40 C40 46 36 42 32 38 C28 42 24 46 24 50Z;
      M22 50 H42 C42 44 36 40 32 36 C28 40 22 44 22 50Z;
