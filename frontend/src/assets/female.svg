<svg width="127" height="126" viewBox="0 0 127 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg1" x1="63.5" y1="0" x2="63.5" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>

    <!-- Skin gradient -->
    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F6BF82"/>
    </linearGradient>

    <!-- Stethoscope gradient -->
    <linearGradient id="stet1" x1="0" y1="0" x2="1" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>

    <!-- Gaussian blur filter -->
    <filter id="gw1"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <!-- Drop shadow filter -->
    <filter id="sh1"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.5"/></filter>

    <!-- Clip path for circular body -->
    <clipPath id="cc1"><circle cx="63.5" cy="63" r="61"/></clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="63.5" cy="63" r="63" fill="url(#bg1)" filter="url(#sh1)"/>
  <circle cx="63.5" cy="63" r="60" fill="none" stroke="white" stroke-width="0.6" opacity="0.15"/>
  <circle cx="63.5" cy="63" r="54" fill="none" stroke="white" stroke-width="0.4" stroke-dasharray="3 4" opacity="0.1"/>

  <!-- Hexagon subtle background -->
  <polygon points="63.5,16 96,35 96,73 63.5,92 31,73 31,35" fill="white" stroke="white" stroke-width="0.5" opacity="0.1"/>

  <!-- Body / White coat -->
  <path d="M30 130 Q30 95 40 84 L53 77 L63.5 91 L74 77 L87 84 Q97 95 97 130Z"
        fill="white" opacity="0.95" clip-path="url(#cc1)"/>
  <!-- Coat lapels -->
  <path d="M53 77 L63.5 91 L74 77 L78 85 L63.5 100 L49 85Z" fill="#E0E7FF" opacity="0.9"/>
  <!-- Coat buttons -->
  <circle cx="63.5" cy="106" r="2" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="63.5" cy="114" r="2" fill="#A5B4FC" opacity="0.45"/>
  <!-- Pocket -->
  <rect x="74" y="94" width="12" height="13" rx="3" fill="#C7D2FE" opacity="0.5"/>
  <line x1="80" y1="94" x2="80" y2="107" stroke="#818CF8" stroke-width="1" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="58" y="68" width="11" height="16" rx="5.5" fill="url(#skin1)"/>

  <!-- Head -->
  <ellipse cx="63.5" cy="51" rx="19" ry="20" fill="url(#skin1)"/>

  <!-- Female hair — long, tied back -->
  <path d="M45 47 Q42 62 44 78 Q46 86 50 88" fill="none" stroke="#3B1F0A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M82 47 Q85 62 83 78 Q81 86 77 88" fill="none" stroke="#3B1F0A" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M45 43 Q47 30 63.5 28 Q80 30 82 43 Q75 34 63.5 35 Q52 34 45 43Z" fill="#2C1810" opacity="0.9"/>
  <path d="M54 32 Q56 36 56 40" fill="none" stroke="#1A0E06" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="81" cy="50" rx="5" ry="4" fill="#2C1810" opacity="0.85"/>

  <!-- Ears -->
  <ellipse cx="44.5" cy="51" rx="3" ry="4.5" fill="url(#skin1)"/>
  <ellipse cx="82.5" cy="51" rx="3" ry="4.5" fill="url(#skin1)"/>
  <!-- Earrings -->
  <circle cx="44.5" cy="56" r="1.8" fill="#A5B4FC" filter="url(#gw1)"/>
  <circle cx="82.5" cy="56" r="1.8" fill="#C4B5FD" filter="url(#gw1)"/>

  <!-- Eyes -->
  <ellipse cx="57" cy="49" rx="2.8" ry="3" fill="#1E1B4B"/>
  <ellipse cx="70" cy="49" rx="2.8" ry="3" fill="#1E1B4B"/>
  <circle cx="57.9" cy="48" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="70.9" cy="48" r="0.9" fill="white" opacity="0.8"/>
  <path d="M54 46.5 Q57 44.5 60 46.5" stroke="#1E1B4B" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M67 46.5 Q70 44.5 73 46.5" stroke="#1E1B4B" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M53.5 44.5 Q57 42 60.5 44" stroke="#2C1810" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M66.5 44.5 Q70 42 73.5 44" stroke="#2C1810" stroke-width="1.3" stroke-linecap="round" fill="none"/>

  <!-- Smile / Lips -->
  <path d="M57.5 57 Q63.5 63 69.5 57" stroke="#E07060" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M59 57 Q63.5 60 68 57" fill="#F9A8A0" opacity="0.5"/>
  <!-- Nose -->
  <path d="M62 53 Q63.5 55.5 65 53" stroke="#D4956A" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- Cheeks blush -->
  <ellipse cx="52" cy="55" rx="5" ry="3" fill="#FBBF9A" opacity="0.35"/>
  <ellipse cx="75" cy="55" rx="5" ry="3" fill="#FBBF9A" opacity="0.35"/>

  <!-- Stethoscope -->
  <path d="M55 69 Q49 65 47 58" fill="none" stroke="url(#stet1)" stroke-width="2.2" stroke-linecap="round" filter="url(#gw1)"/>
  <path d="M72 69 Q78 65 80 58" fill="none" stroke="url(#stet1)" stroke-width="2.2" stroke-linecap="round" filter="url(#gw1)"/>
  <circle cx="46" cy="56" r="3.5" fill="#60A5FA" filter="url(#gw1)"/>
  <circle cx="81" cy="56" r="3.5" fill="#A78BFA" filter="url(#gw1)"/>
  <circle cx="46" cy="56" r="1.5" fill="white" opacity="0.45"/>
  <circle cx="81" cy="56" r="1.5" fill="white" opacity="0.45"/>
  <path d="M47 59 Q43 78 45 93 Q47 107 58 113 Q63.5 116 69 113 Q80 107 82 93 Q84 78 80 59" fill="none" stroke="url(#stet1)" stroke-width="2.2" stroke-linecap="round" filter="url(#gw1)"/>
  <circle cx="63.5" cy="116" r="7" fill="#1E1B4B" stroke="url(#stet1)" stroke-width="1.8"/>
  <circle cx="63.5" cy="116" r="3.5" fill="#60A5FA" opacity="0.65"/>

  <!-- Cross badge -->
  <circle cx="100" cy="22" r="14" fill="#4F46E5" opacity="0.95" filter="url(#gw1)"/>
  <circle cx="100" cy="22" r="13" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <rect x="96.5" y="15" width="7" height="14" rx="3" fill="white"/>
  <rect x="93" y="18.5" width="14" height="7" rx="3" fill="white"/>
</svg>