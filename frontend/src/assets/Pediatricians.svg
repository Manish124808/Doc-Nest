<svg width="127" height="126" viewBox="0 0 127 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="63.5" y1="0" x2="63.5" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>

    <linearGradient id="skin1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F6BF82"/>
    </linearGradient>

    <filter id="sh1"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Background -->
  <circle cx="63.5" cy="63" r="63" fill="url(#bg1)" filter="url(#sh1)"/>

  <!-- Body / T-shirt (child version - shorter and rounder) -->
  <path d="M45 105 Q45 85 53 77 L63.5 88 L74 77 Q82 85 82 105 Z" fill="#FF6B6B" opacity="0.95"/>
  <!-- Simple shirt highlight -->
  <path d="M52 80 L63.5 88 L73 80 L75 87 L63.5 96 L51 87 Z" fill="#FF8E8E" opacity="0.7"/>

  <!-- Arms (short child arms) -->
  <path d="M47 88 Q40 95 42 105" stroke="#FDDCB5" stroke-width="9" stroke-linecap="round"/>
  <path d="M80 88 Q87 95 85 105" stroke="#FDDCB5" stroke-width="9" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="58.5" y="68" width="10" height="13" rx="5" fill="url(#skin1)"/>

  <!-- Head (larger and rounder for child look) -->
  <ellipse cx="63.5" cy="49" rx="22" ry="23" fill="url(#skin1)"/>

  <!-- Hair (softer, fluffier child hairstyle) -->
  <path d="M42 38 Q50 25 63.5 23 Q77 25 85 38 Q82 32 70 28 Q63.5 26 57 28 Q48 32 42 38Z" fill="#2C1810" opacity="0.95"/>

  <!-- Ears (slightly smaller) -->
  <ellipse cx="42.5" cy="50" rx="3.5" ry="5" fill="url(#skin1)"/>
  <ellipse cx="84.5" cy="50" rx="3.5" ry="5" fill="url(#skin1)"/>

  <!-- Eyes (bigger and more innocent-looking) -->
  <ellipse cx="55.5" cy="47.5" rx="3" ry="4" fill="#1E1B4B"/>
  <ellipse cx="71.5" cy="47.5" rx="3" ry="4" fill="#1E1B4B"/>
  <!-- Eye shines -->
  <circle cx="56.5" cy="46" r="1" fill="white"/>
  <circle cx="72.5" cy="46" r="1" fill="white"/>

  <!-- Mouth (cute small smile) -->
  <path d="M57 58 Q63.5 62 70 58" stroke="#FF4D6D" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Cheeks blush (more prominent on child) -->
  <ellipse cx="50" cy="54" rx="4.5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="77" cy="54" rx="4.5" ry="3" fill="#FFB6C1" opacity="0.6"/>
</svg>