<svg width="126" height="126" viewBox="0 0 126 126" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main bg gradient matching blue-600 → indigo-600 → purple-600 -->
    <linearGradient id="bgG" x1="0" y1="0" x2="126" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="50%"  stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>

    <!-- Ring border gradient -->
    <linearGradient id="ringG" x1="0" y1="0" x2="126" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <!-- Skin tone -->
    <linearGradient id="skinG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F6BF82"/>
    </linearGradient>

    <!-- White coat gradient -->
    <linearGradient id="coatG" x1="0" y1="70" x2="0" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>

    <!-- Stethoscope gradient -->
    <linearGradient id="stethG" x1="20" y1="60" x2="106" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#BAE6FD"/>
      <stop offset="50%"  stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>

    <!-- Hair gradient — dark purple-black -->
    <linearGradient id="hairG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1E1147"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>

    <!-- Female symbol gradient -->
    <linearGradient id="femG" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>

    <!-- Core radial glow -->
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%"   stop-color="#4F46E5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass card -->
    <linearGradient id="glassG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.55"/>
    </filter>

    <clipPath id="circleClip">
      <circle cx="63" cy="63" r="61"/>
    </clipPath>
  </defs>

  <!-- ── OUTER HALO ── -->
  <circle cx="63" cy="63" r="63" fill="#4F46E5" opacity="0.1"/>

  <!-- ── MAIN CIRCLE ── -->
  <circle cx="63" cy="63" r="63" fill="url(#bgG)" filter="url(#shadow)"/>

  <!-- ── GRADIENT BORDER ── -->
  <circle cx="63" cy="63" r="61.5" fill="none" stroke="url(#ringG)" stroke-width="2"/>

  <!-- ── INNER RINGS ── -->
  <circle cx="63" cy="63" r="57"  fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <circle cx="63" cy="63" r="51"  fill="none" stroke="white" stroke-width="0.3" opacity="0.06"/>

  <!-- ── CORE GLOW ── -->
  <circle cx="63" cy="68" r="48" fill="url(#coreGlow)"/>

  <!-- ── HEX GEOMETRY BG ── -->
  <polygon points="63,16 97,35 97,73 63,92 29,73 29,35"
           fill="white" opacity="0.03" stroke="white" stroke-width="0.6" opacity="0.12"/>

  <!-- ── CORNER TRIANGLES ── -->
  <polygon points="2,2   20,2   2,20"   fill="#3B82F6" opacity="0.2"/>
  <polygon points="124,2  104,2  124,20" fill="#8B5CF6" opacity="0.18"/>
  <polygon points="2,124  20,124  2,104" fill="#6366F1" opacity="0.18"/>
  <polygon points="124,124 104,124 124,104" fill="#7C3AED" opacity="0.2"/>

  <!-- ── TICK MARKS ── -->
  <g stroke="white" stroke-width="0.9" opacity="0.2">
    <line x1="63" y1="3"   x2="63" y2="10"/>
    <line x1="63" y1="116" x2="63" y2="123"/>
    <line x1="3"  y1="63"  x2="10" y2="63"/>
    <line x1="116" y1="63" x2="123" y2="63"/>
    <line x1="14" y1="14"  x2="19" y2="19"/>
    <line x1="112" y1="14" x2="107" y2="19"/>
    <line x1="14" y1="112" x2="19" y2="107"/>
    <line x1="112" y1="112" x2="107" y2="107"/>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!--   FEMALE DOCTOR — detailed figure  -->
  <!-- ═══════════════════════════════════ -->

  <!-- COAT / BODY -->
  <path d="M34 126 Q34 94 42 86 L52 80 L63 93 L74 80 L84 86 Q92 94 92 126Z"
        fill="url(#coatG)" clip-path="url(#circleClip)"/>
  <!-- Coat lapels -->
  <path d="M52 80 L63 93 L74 80 L78 87 L63 101 L48 87Z"
        fill="#E0E7FF" opacity="0.9"/>
  <!-- Coat side seams -->
  <line x1="48" y1="87" x2="40" y2="126" stroke="#C7D2FE" stroke-width="0.8" opacity="0.6"/>
  <line x1="78" y1="87" x2="86" y2="126" stroke="#C7D2FE" stroke-width="0.8" opacity="0.6"/>
  <!-- Coat buttons -->
  <circle cx="63" cy="104" r="1.8" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="63" cy="112" r="1.8" fill="#A5B4FC" opacity="0.5"/>
  <!-- Breast pocket -->
  <rect x="72" y="90" width="10" height="10" rx="2.5" fill="#C7D2FE" opacity="0.5"/>
  <!-- Pocket pen -->
  <line x1="76" y1="90" x2="76" y2="100" stroke="#818CF8" stroke-width="0.9" stroke-linecap="round"/>

  <!-- NECK -->
  <rect x="58" y="64" width="10" height="14" rx="5" fill="url(#skinG)"/>

  <!-- HEAD -->
  <ellipse cx="63" cy="48" rx="18" ry="19" fill="url(#skinG)"/>

  <!-- HAIR — long female hair -->
  <!-- Top hair -->
  <path d="M46 44 Q47 28 63 26 Q79 28 80 44 Q75 34 63 35 Q51 34 46 44Z"
        fill="url(#hairG)" opacity="0.92"/>
  <!-- Left side hair flowing down -->
  <path d="M46 44 Q40 52 41 64 Q42 72 46 76 Q44 68 45 58 Q46 50 48 46Z"
        fill="url(#hairG)" opacity="0.88"/>
  <!-- Right side hair flowing down -->
  <path d="M80 44 Q86 52 85 64 Q84 72 80 76 Q82 68 81 58 Q80 50 78 46Z"
        fill="url(#hairG)" opacity="0.88"/>
  <!-- Hair highlight -->
  <path d="M56 28 Q63 26 70 28 Q65 27 63 27 Q61 27 56 28Z"
        fill="white" opacity="0.12"/>

  <!-- EARS -->
  <ellipse cx="45" cy="49" rx="3"   ry="4.5" fill="#F6BF82"/>
  <ellipse cx="81" cy="49" rx="3"   ry="4.5" fill="#F6BF82"/>

  <!-- EYES — female styled with lashes -->
  <ellipse cx="56.5" cy="47" rx="3.2" ry="3.5" fill="#1E1B4B"/>
  <ellipse cx="69.5" cy="47" rx="3.2" ry="3.5" fill="#1E1B4B"/>
  <!-- Eye shine -->
  <circle cx="57.5" cy="46" r="1.1" fill="white" opacity="0.85"/>
  <circle cx="70.5" cy="46" r="1.1" fill="white" opacity="0.85"/>
  <!-- Upper lashes left -->
  <path d="M53 44 Q56.5 42 60 44" stroke="#1E1B4B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Upper lashes right -->
  <path d="M66.5 44 Q69.5 42 73 44" stroke="#1E1B4B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Eyebrows — arched female brows -->
  <path d="M53 42 Q56.5 39.5 60 41" stroke="#2E1065" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <path d="M66.5 41 Q70 39.5 73 42" stroke="#2E1065" stroke-width="1.3" stroke-linecap="round" fill="none"/>

  <!-- NOSE -->
  <path d="M62 50 Q60 54 62 56 Q63 57 64 56 Q66 54 64 50" stroke="#D4956A" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- LIPS — female styled -->
  <path d="M57 59 Q60 56.5 63 57.5 Q66 56.5 69 59 Q66 62 63 62 Q60 62 57 59Z"
        fill="#F472B6" opacity="0.75"/>
  <path d="M57 59 Q63 57.5 69 59" stroke="#EC4899" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- EARRINGS — small feminine touch -->
  <circle cx="45" cy="55" r="2"   fill="#F9A8D4" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="81" cy="55" r="2"   fill="#F9A8D4" opacity="0.9" filter="url(#softglow)"/>

  <!-- ═══════════════════ -->
  <!--   STETHOSCOPE       -->
  <!-- ═══════════════════ -->

  <!-- Left ear tube -->
  <path d="M52 67 Q45 63 43 54"
        fill="none" stroke="url(#stethG)" stroke-width="2.8"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right ear tube -->
  <path d="M74 67 Q81 63 83 54"
        fill="none" stroke="url(#stethG)" stroke-width="2.8"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left earpiece diamond -->
  <g filter="url(#glow)">
    <polygon points="37,47  43,41  49,47  43,53" fill="#60A5FA"/>
    <polygon points="37,47  43,41  49,47  43,53" fill="none" stroke="#BAE6FD" stroke-width="0.8" opacity="0.8"/>
    <circle cx="43" cy="47" r="1.6" fill="white" opacity="0.45"/>
  </g>
  <!-- Right earpiece diamond -->
  <g filter="url(#glow)">
    <polygon points="77,47  83,41  89,47  83,53" fill="#A78BFA"/>
    <polygon points="77,47  83,41  89,47  83,53" fill="none" stroke="#DDD6FE" stroke-width="0.8" opacity="0.8"/>
    <circle cx="83" cy="47" r="1.6" fill="white" opacity="0.45"/>
  </g>

  <!-- Tube loop down -->
  <path d="M43 53 Q39 72 41 86 Q43 99 54 104 Q63 108 72 104 Q83 99 85 86 Q87 72 83 53"
        fill="none" stroke="url(#stethG)" stroke-width="2.8"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Chest piece octagon -->
  <g filter="url(#glow)">
    <polygon points="56,100  60,95  68,95  72,100  72,107  68,112  60,112  56,107"
             fill="#1E1B4B" stroke="url(#ringG)" stroke-width="1.5"/>
    <polygon points="58,101  62,97  66,97  70,101  70,106  66,110  62,110  58,106"
             fill="none" stroke="#818CF8" stroke-width="0.5" opacity="0.4"/>
    <circle cx="64" cy="103" r="4.2" fill="url(#stethG)" opacity="0.95"/>
    <circle cx="64" cy="103" r="1.8" fill="white" opacity="0.4"/>
  </g>

  <!-- ══════════════════════ -->
  <!--   FEMALE SYMBOL BADGE -->
  <!-- ══════════════════════ -->
  <circle cx="99" cy="27" r="14" fill="#1E1B4B" stroke="url(#femG)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Female symbol ♀ -->
  <!-- Circle part -->
  <circle cx="99" cy="22" r="6" fill="none" stroke="url(#femG)" stroke-width="2" filter="url(#glow)"/>
  <!-- Vertical line down -->
  <line x1="99" y1="28" x2="99" y2="36" stroke="url(#femG)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Horizontal crossbar -->
  <line x1="95" y1="33" x2="103" y2="33" stroke="url(#femG)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- ── DIVIDER ── -->
  <rect x="18" y="116" width="90" height="0.8" rx="0.4"
        fill="url(#ringG)" opacity="0.5"/>

  <!-- ── LABEL ── -->
  <text x="63" y="123"
        font-family="'Courier New','Consolas',monospace"
        font-size="5.5" font-weight="700" letter-spacing="1.8"
        text-anchor="middle" fill="#C4B5FD" opacity="0.88">GYNAECOLOGIST</text>

</svg>
